# Project Config Template
# Copy file này thành <project-name>.yaml và fill in values.

project: PROJECT_NAME              # slug, ví dụ: itg-mobile
display_name: PROJECT DISPLAY NAME # ví dụ: ITG Mobile
repo: github.com/USER/REPO         # optional, để tracking
root_path: /ABSOLUTE/PATH/TO/PROJECT

# ─────────────── STACK ───────────────
stack:
  flutter: 3.27.0
  riverpod: 2.5.0                 # set null nếu không dùng
  riverpod_generator: false        # true nếu dùng @riverpod codegen
  go_router: 14.0.0               # null nếu không dùng
  dio: 5.4.0                      # null nếu không dùng
  design_system: lme_ui@2.1.0     # hoặc "custom", "none"
  freezed: true                    # true nếu dùng @freezed

# ─────────────── FIGMA ───────────────
figma:
  file_key: null                   # ABCxyz123 — từ figma.com/design/<file_key>/
  default_node_url_format: figma.com/design/{file_key}/?node-id={node_id}

# ─────────────── PATHS ───────────────
paths:
  features: lib/features
  shared: lib/shared
  theme: lib/theme
  ignore:
    - "**/*.g.dart"
    - "**/*.freezed.dart"
    - "**/generated/**"
    - "lib/firebase_options.dart"

# ─────────────── RULES OVERRIDE ───────────────
# Override severity hoặc add exceptions per rule.
# Rule list: xem core/rules.yaml
rules:
  tokens-compliance.no-hardcode-color:
    severity: error
    exceptions: []
    # Example exception:
    # exceptions:
    #   - pattern: Color.fromARGB
    #     context: gradient_overlay
    #     reason: Design chưa có gradient token

  tokens-compliance.spacing-arbitrary:
    severity: warn

  architecture.no-setstate-feature:
    severity: error

  architecture.gorouter-no-navigator-push:
    severity: warn
    enabled: true  # set false nếu chưa dùng GoRouter

  icons-compliance.no-material-icons:
    severity: error
    exceptions:
      # Add icon names that are explicitly allowed
      # - icon_name: arrow_back
      #   reason: Native back, DS chưa có
      #   allowed_in: ["AppBar leading"]

  i18n-check.no-hardcode-vietnamese:
    severity: warn
    # severity: error khi đã hoàn thành migrate i18n

# ─────────────── STATE MACHINES ───────────────
# Cho check spec compliance (sau)
state_machines:
  # order:
  #   file: lib/features/order/states/order_status.dart
  #   spec: docs/spec/order-flow.md

# ─────────────── API CONTRACT ───────────────
api:
  openapi_spec: null               # path tới openapi.yaml nếu có
  base_url: null

# ─────────────── NOTIFICATION ───────────────
notify:
  telegram_chat_id: null
  slack_webhook: null

# ─────────────── METRICS ───────────────
metrics:
  release_score_min: 85
  enabled_checks:
    - tokens-compliance
    - architecture
    - icons-compliance
    # - figma-fidelity     # enable khi đã setup Figma MCP
    # - i18n-check         # enable khi cần
    # - states-coverage    # enable khi spec ready
    # - spec-compliance    # cần spec
    # - api-contract       # cần OpenAPI

# ─────────────── HISTORY ───────────────
history:
