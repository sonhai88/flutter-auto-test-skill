# Proposed Bug Patterns
# Khi script mine git history hoặc anh report pattern mới → append vào đây.
# Pattern lifecycle: PROPOSED → TESTING (14 ngày) → VALIDATED → ACTIVE.

version: 1
schema:
  - id: pattern-YYYY-MM-DD-NNN
  - title: short description
  - status: PROPOSED | TESTING | VALIDATED | ACTIVE | DEPRECATED
  - detected_from: git-history-mining | hai-manual-report | claude-suggestion
  - detected_at: YYYY-MM-DD
  - detection_logic: how to find this pattern
  - examples_caught: list of git commits / files where pattern appeared
  - testing_in_project: project slug used for testing window
  - testing_started: YYYY-MM-DD
  - testing_window_days: 14
  - metrics:
      true_positives: count
      false_positives: count
      fp_rate: float
  - promote_at: target date for promotion
  - notes: optional

patterns:
  - id: pattern-2026-05-27-001
    title: "Print debug còn sót production code"
    status: PROPOSED
    detected_from: pilot-audit-itg-mobile
    detected_at: 2026-05-27
    detection_logic: |
      Grep `print\(` trong lib/ (trừ lib/test/, lib/dev/, file có @visibleForTesting)
      Suggest: replace với logger package (logger / talker) hoặc xoá trước release
    examples_caught:
      - file: /Volumes/hai/itg-mobile/lib/page/auth/login/login_page.dart
        line: 62
        snippet: 'print("call signIn api");'
      - file: /Volumes/hai/itg-mobile/lib/page/auth/login/login_page.dart
        line: 64
        snippet: 'print("login success");'
      - file: /Volumes/hai/itg-mobile/lib/page/auth/login/login_page.dart
        line: 92
        snippet: 'print("login failed $error, $stackTrace");'
    testing_in_project: itg-mobile
    testing_started: null              # chờ anh approve
    testing_window_days: 14
    metrics:
      true_positives: 0
      false_positives: 0
      fp_rate: 0.0
    promote_at: null
    notes: |
      High-value pattern: print() trong production = log thiếu kiểm soát + lộ debug info.
      Có thể catch >90% case bằng grep đơn giản.

  - id: pattern-2026-05-27-002
    title: "Responsive magic numbers MediaQuery.size.* * .X/2"
    status: PROPOSED
    detected_from: pilot-audit-itg-mobile
    detected_at: 2026-05-27
    detection_logic: |
      Regex: MediaQuery\.of\(context\)\.size\.(width|height)\s*\*\s*\.?\d
      → flag pattern responsive với magic ratio cần thay bằng constants/package
    examples_caught:
      - file: /Volumes/hai/itg-mobile/lib/page/auth/login/login_page.dart
        lines: [141, 161, 191, 192, 237, 246, 247]
        note: lặp 7 lần trong 1 file → smell rõ
    testing_in_project: itg-mobile
    testing_started: null
    testing_window_days: 14
    metrics:
      true_positives: 0
      false_positives: 0
      fp_rate: 0.0
    promote_at: null
    notes: |
      Medium-value. Có thể FP cao nếu project intentional dùng pattern này.
      Cân nhắc severity INFO, không WARN.

  - id: pattern-2026-05-27-003
    title: "Nested setState trong .then()/.catchError() chain"
    status: PROPOSED
    detected_from: pilot-audit-itg-mobile
    detected_at: 2026-05-27
    detection_logic: |
      AST: Detect `.then(` followed by setState within callback
      Pattern: nested promise chain với multiple setState calls
      Suggest: refactor sang async/await + try-catch
    examples_caught:
      - file: /Volumes/hai/itg-mobile/lib/page/auth/login/login_page.dart
        lines: [63, 67, 79, 84, 91, 99, 109]
        note: signIn().then().catchError().whenComplete() với 5 setState lồng nhau
    testing_in_project: itg-mobile
    testing_started: null
    testing_window_days: 14
    metrics:
      true_positives: 0
      false_positives: 0
      fp_rate: 0.0
    promote_at: null
    notes: |
      Style rule, không phải bug nhưng làm hard-to-debug.
      Có thể overlap với linter built-in `prefer_async_await`.
      Check linter trước khi promote.

# ───────────── EXAMPLES ─────────────
examples:
  - id: pattern-EXAMPLE-001
    title: "Material Icons import unused"
    status: PROPOSED
    detected_from: git-history-mining
    detected_at: 2026-05-30
    detection_logic: |
      File import 'package:flutter/material.dart' nhưng:
      - Không có Icons.* nào
      - Chỉ tham chiếu MaterialApp, Theme, ThemeData
      → Đề xuất dùng widgets.dart thay vì material.dart full.
    examples_caught:
      - commit: a3f2e1b
        file: lib/features/cart/cart_screen.dart
        line: 3
        note: chỉ dùng Container, Text — không cần material
    testing_in_project: itg-mobile
    testing_started: null            # khi anh approve → fill ngày
    testing_window_days: 14
    metrics:
      true_positives: 0
      false_positives: 0
      fp_rate: 0.0
    promote_at: null                 # tính sau khi testing
    notes: |
      Cần kiểm tra ko break flow — vài widget yêu cầu material context.

# ───────────── PROMOTION CRITERIA ─────────────
# Tiêu chí để pattern promote PROPOSED → ACTIVE:
promotion_criteria:
  min_true_positives: 3
  max_fp_rate: 0.10                  # < 10% false positive rate
  min_window_days: 14
  required_manual_approval: true     # anh phải approve cuối cùng
